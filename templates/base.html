<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10182b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zomercomp">
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/app.css">
  <title>Zomercompetitie</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand-mark" href="/">🎯</a>
        <div>
          <h1><a href="/">Zomercompetitie</a></h1>
          <p class="subtitle">Mobiel scorecenter voor poules, knock-outs en seizoenstanden.</p>
        </div>
      </div>
      <nav class="topnav" aria-label="Hoofdnavigatie">
        <a href="/">Dashboard</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>

    <nav class="bottom-nav" aria-label="Snelle navigatie">
      <a href="/">🏠 <span>Dashboard</span></a>
      <a href="/admin">⚙️ <span>Admin</span></a>
    </nav>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js'));
    }
  </script>
</body>
</html>
