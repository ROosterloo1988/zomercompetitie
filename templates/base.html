<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10182b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zomercomp">
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/app.css">
  <title>Zomercompetitie</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand-mark" href="/">
	<img src="/static/icons/icon-192.png" alt="Logo" width="48" height="48" style="object-fit: contain;">
	</a>
        <div>
          <h1><a href="/">Zomercompetitie</a></h1>
        </div>
      </div>
      <nav class="topnav" aria-label="Hoofdnavigatie">
        <a href="/">Dashboard</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js'));
    }
  </script>
  <script src="/static/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const topbar = document.querySelector('.topbar');
    
    // Controleer of de topbar bestaat op deze pagina
    if (topbar) {
      window.addEventListener('scroll', function() {
        // Als we meer dan 50 pixels naar beneden zijn gescrolld...
        if (window.scrollY > 50) {
          topbar.classList.add('is-scrolled');
        } else {
          topbar.classList.remove('is-scrolled');
        }
      });
    }
  });
</script>

</body>
</html>
