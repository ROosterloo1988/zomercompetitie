<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10182b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zomercomp">
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/app.css">
  <title>Zomercompetitie</title>

<script>
  const savedTheme = localStorage.getItem('app-theme');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
</script>

</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand-mark" href="/">
	<img src="/static/icons/icon-192.png" alt="Logo" width="48" height="48" style="object-fit: contain;">
	</a>
        <div>
          <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
  <h1 style="margin: 0;">Zomercompetitie</h1>
  
  <div style="display: flex; align-items: center; gap: 0.4rem; margin-top: 2px;">
    <label class="toggle-switch" style="transform: scale(0.75); margin: 0;" title="Thema aanpassen">
      <input type="checkbox" id="theme-toggle-btn">
      <span class="toggle-slider"></span>
    </label>
    <span id="theme-status-text" style="font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase;">Licht</span>
  </div>
</div>


        </div>
      </div>
<nav class="topnav" aria-label="Hoofdnavigatie">
        <a href="/">Dashboard</a>
        <a href="/admin">Admin</a>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js'));
    }
  </script>
  <script src="/static/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const topbar = document.querySelector('.topbar');
    
    // Controleer of de topbar bestaat op deze pagina
    if (topbar) {
      window.addEventListener('scroll', function() {
        // Als we meer dan 50 pixels naar beneden zijn gescrolld...
        if (window.scrollY > 50) {
          topbar.classList.add('is-scrolled');
        } else {
          topbar.classList.remove('is-scrolled');
        }
      });
    }
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Herstel positie mét een kleine vertraging
    const savedScroll = sessionStorage.getItem('scrollPosition');
    if (savedScroll) {
      setTimeout(function() {
        window.scrollTo({
          top: parseInt(savedScroll),
          left: 0,
          behavior: 'auto'
        });
      }, 100);
      sessionStorage.removeItem('scrollPosition');
    }
    
    // 2. Sla de positie op bij de zwevende Opslaan-knop
    const saveButton = document.getElementById('floating-save-button');
    if (saveButton) {
      saveButton.addEventListener('click', function() {
        const currentPosition = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;
        sessionStorage.setItem('scrollPosition', currentPosition);
      });
    }

    // 3. NIEUW: Sla de positie op bij elke toggle-schakelaar (aanwezigheid / admin status)
    const toggleCheckboxes = document.querySelectorAll('.toggle-form input[type="checkbox"]');
    toggleCheckboxes.forEach(function(checkbox) {
      checkbox.addEventListener('change', function() {
        const currentPosition = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;
        sessionStorage.setItem('scrollPosition', currentPosition);
      });
    });
    
  });
</script>

<div id="toast-container" class="toast-container"></div>

<script>
  // 1. Toast meldingen tonen
  function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = '✅ ' + message;
    container.appendChild(toast);
    setTimeout(() => toast.classList.add('show'), 10);
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 3000);
  }

  // 2. Global Listener voor CLICKS (voor de Opslaan-actie)
  document.addEventListener('click', function(e) {
    const saveButton = e.target.closest('#floating-save-button');
    if (saveButton) {
      const saveForm = document.getElementById('bulk-results-form');
      if (saveForm) {
        e.preventDefault(); 
        saveButton.innerHTML = 'Opslaan...';
        saveButton.style.opacity = '0.8';
        showToast("Uitslagen succesvol opgeslagen!");
        setTimeout(() => { saveForm.submit(); }, 1200);
      }
    }
  });

  // 3. 🚀 NIEUW: Global Listener voor INPUT (Toont de knop zodra je typt)
  // Dit werkt ALTIJD, ook na een WebSocket update van de poules!
  document.addEventListener('input', function(e) {
    if (e.target.hasAttribute('data-live-match-input')) {
      const saveButton = document.getElementById('floating-save-button');
      if (saveButton) {
        saveButton.removeAttribute('hidden');
        // Voeg de class toe aan de sectie voor de juiste padding onderaan
        document.querySelector('.matches-section')?.classList.add('has-floating-save');
      }
    }
  });


  // 🚀 Activeer de Dark Mode Slider mét tekst-update
  document.addEventListener('DOMContentLoaded', () => {
    const themeBtn = document.getElementById('theme-toggle-btn');
    const themeText = document.getElementById('theme-status-text');
    
    if (themeBtn) {
      // 1. Zet het schuifje én de tekst goed bij het inladen
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      themeBtn.checked = isDark;
      if (themeText) {
        themeText.textContent = isDark ? 'Donker' : 'Licht';
      }
      
      // 2. Luister naar kliks
      themeBtn.addEventListener('change', (e) => {
        const isNowDark = e.target.checked;
        const newTheme = isNowDark ? 'dark' : 'light';
        
        // Sla het thema op en pas toe
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('app-theme', newTheme); 
        
        // Pas direct het tekstje aan
        if (themeText) {
          themeText.textContent = isNowDark ? 'Donker' : 'Licht';
        }
      });
    }
  });


</script>



</body>
</html>
