<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#10182b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Zomercomp">
  <link rel="manifest" href="/pwa/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">
  <link rel="stylesheet" href="/static/app.css">
  <title>Zomercompetitie</title>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <a class="brand-mark" href="/">
	<img src="/static/icons/icon-192.png" alt="Logo" width="48" height="48" style="object-fit: contain;">
	</a>
        <div>
          <h1><a href="/">Zomercompetitie</a></h1>
        </div>
      </div>
<nav class="topnav" aria-label="Hoofdnavigatie">
        <a href="/">Dashboard</a>
        <a href="/admin">Admin</a>
      </nav>
      </nav>
    </header>

    <main>
      {% block content %}{% endblock %}
    </main>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/static/sw.js'));
    }
  </script>
  <script src="/static/app.js"></script>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const topbar = document.querySelector('.topbar');
    
    // Controleer of de topbar bestaat op deze pagina
    if (topbar) {
      window.addEventListener('scroll', function() {
        // Als we meer dan 50 pixels naar beneden zijn gescrolld...
        if (window.scrollY > 50) {
          topbar.classList.add('is-scrolled');
        } else {
          topbar.classList.remove('is-scrolled');
        }
      });
    }
  });
</script>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    
    // 1. Herstel positie mét een kleine vertraging
    const savedScroll = sessionStorage.getItem('scrollPosition');
    if (savedScroll) {
      setTimeout(function() {
        window.scrollTo({
          top: parseInt(savedScroll),
          left: 0,
          behavior: 'auto'
        });
      }, 100);
      sessionStorage.removeItem('scrollPosition');
    }
    
    // 2. Sla de positie op bij de zwevende Opslaan-knop
    const saveButton = document.getElementById('floating-save-button');
    if (saveButton) {
      saveButton.addEventListener('click', function() {
        const currentPosition = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;
        sessionStorage.setItem('scrollPosition', currentPosition);
      });
    }

    // 3. NIEUW: Sla de positie op bij elke toggle-schakelaar (aanwezigheid / admin status)
    const toggleCheckboxes = document.querySelectorAll('.toggle-form input[type="checkbox"]');
    toggleCheckboxes.forEach(function(checkbox) {
      checkbox.addEventListener('change', function() {
        const currentPosition = window.scrollY || window.pageYOffset || document.documentElement.scrollTop;
        sessionStorage.setItem('scrollPosition', currentPosition);
      });
    });
    
  });
</script>

<div id="toast-container" class="toast-container"></div>

<script>
  // Functie om de toast daadwerkelijk te maken en te tonen
  function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = 'toast-message';
    toast.innerHTML = '✅ ' + message;

    container.appendChild(toast);

    // Kleine vertraging om de CSS animatie goed te laten starten
    setTimeout(() => toast.classList.add('show'), 10);

    // Na 3 seconden weer laten verdwijnen (voor het geval de pagina niet herlaadt)
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400); // Wacht tot animatie klaar is met verdwijnen
    }, 3000);
  }

  // Luister naar het opslaan van uitslagen
  document.addEventListener('DOMContentLoaded', function() {
    const saveForm = document.getElementById('bulk-results-form');
    const saveButton = document.getElementById('floating-save-button');
    
    if (saveForm && saveButton) {
      saveButton.addEventListener('click', function(e) {
        // Blokkeer het direct herladen van de pagina
        e.preventDefault(); 
        
        // Verander de tekst van de knop zodat de gebruiker weet dat ie laadt
        saveButton.innerHTML = 'Opslaan...';
        saveButton.style.opacity = '0.8';

        // Toon de mooie melding
        showToast("Uitslagen succesvol opgeslagen!");

        // Wacht 1,2 seconden zodat de melding goed te lezen is, stuur dan door naar de database
        setTimeout(() => {
          saveForm.submit();
        }, 1200);
      });
    }
  });
</script>

</body>
</html>
