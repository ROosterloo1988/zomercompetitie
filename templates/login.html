<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inloggen - Zomercompetitie</title>
    <link href="/static/css/style.css" rel="stylesheet"> 
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Alleen Toegang Voor Beheerders</h2>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Beheerderswachtwoord</label>
                <input type="password" name="password" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required autofocus>
            </div>
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full">
                    Ontgrendel Dashboard
                </button>
            </div>
        </form>
        <div class="text-center mt-4">
            <a href="/" class="text-sm text-gray-500 hover:text-gray-800">← Terug naar de homepagina</a>
        </div>
    </div>
</body>
</html>
