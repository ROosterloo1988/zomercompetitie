<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inloggen - Zomercompetitie</title>
    <link href="/static/css/style.css" rel="stylesheet">
    <style>
        /* Specifieke positionering voor de login-pagina, 
           zonder de rest van je app.css te verstoren */
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 1.5rem;
            /* We lenen hier jouw prachtige styling uit de page-hero en sections */
            border-radius: var(--radius);
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            background: linear-gradient(180deg, var(--panel), var(--panel-2));
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 0.25rem;
            color: var(--text);
            font-size: 1.3rem;
        }

        .login-card p.subtitle {
            margin-bottom: 1.5rem;
        }

        .login-form {
            display: grid;
            gap: 1.2rem;
            text-align: left;
        }

        .login-form label {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: -0.8rem; /* Trekt het label iets dichter naar het invulveld */
            display: block;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--muted);
            transition: color 0.2s ease;
        }
        
        .back-link:hover {
            color: var(--text);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <h2>Beheerders Login</h2>
            <p class="subtitle">Log in om het admin-dashboard te ontgrendelen.</p>

            {% if error %}
            <div class="error" style="margin-bottom: 1.2rem; text-align: left;">
                {{ error }}
            </div>
            {% endif %}

            <form action="/login" method="POST" class="login-form">
                <label for="password">Wachtwoord</label>
                <input type="password" id="password" name="password" required autofocus placeholder="Vul je wachtwoord in...">
                
                <button type="submit">Ontgrendel Dashboard</button>
            </form>

            <a href="/" class="back-link">← Terug naar de homepagina</a>
        </div>
    </div>
</body>
</html>
